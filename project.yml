name: MDViewer
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.facundo.mdviewer
    PRODUCT_NAME: MDViewer
    MARKETING_VERSION: 0.1.12
    CURRENT_PROJECT_VERSION: 12
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 13.0
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: macos/Info.plist
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: NXJ8VR67NC
    CODE_SIGN_IDENTITY: Apple Development
    CODE_SIGN_ENTITLEMENTS: macos/MDViewer.entitlements
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
packages:
  DownGFM:
    url: https://github.com/stackotter/Down-gfm
    from: 0.12.0
targets:
  MDViewer:
    type: application
    platform: macOS
    dependencies:
      - package: DownGFM
        product: Down
    sources:
      - path: Sources/MDViewer
      - path: macos/Assets.xcassets
        buildPhase: resources
      - path: macos/AppIcon.icns
        buildPhase: resources
      - path: macos/MarkdownDocument.icns
        buildPhase: resources
    scheme:
      gatherCoverageData: false
      testTargets:
        - name: MDViewerTests
  MDViewerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/MDViewerTests
    dependencies:
      - target: MDViewer
